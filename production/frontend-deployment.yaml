apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-frontend
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp-frontend
  template:
    metadata:
      labels:
        app: myapp-frontend
    spec:
      containers:
        - name: myapp-frontend
          image: irwan34/frontend-service@sha256:04ead07aa5f8731b0d4371995c0b7ad4a94ddfb8d3540cd2b17e55a2e0d36edf
          ports:
            - containerPort: 8000

