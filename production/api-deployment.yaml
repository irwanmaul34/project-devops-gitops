apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-api
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp-api
  template:
    metadata:
      labels:
        app: myapp-api
    spec:
      containers:
        - name: myapp-api
          image: irwan34/api-service@sha256:f1164588a4c83e34da77343bdde7ac167ba67d0dbfe1d95dce991ae6bfbdce69
          ports:
            - containerPort: 8000

