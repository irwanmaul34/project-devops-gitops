apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-api
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp-api
  template:
    metadata:
      labels:
        app: myapp-api
    spec:
      containers:
        - name: myapp-api
          image: irwan34/api-service@sha256:c13ed7311a10162e4e2c8b4f6c107b2929a8b71aab7a67c81c1be95a9cf0a111
          ports:
            - containerPort: 8000

