apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-api
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp-api
  template:
    metadata:
      labels:
        app: myapp-api
    spec:
      containers:
        - name: myapp-api
          image: irwan34/api-service@sha256:1bfbb9e029c995cb5f375965d31234d1a89e5f5643096dea7e0bcda2f712f8aa
          ports:
            - containerPort: 8000

