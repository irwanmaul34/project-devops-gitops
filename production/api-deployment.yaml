apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-api
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp-api
  template:
    metadata:
      labels:
        app: myapp-api
    spec:
      containers:
        - name: myapp-api
          image: irwan34/api-service@sha256:1ea7b5d3cdd92fe5cfc7150ec58c57dade5e70912b8fa5e2f52cef995778afab
          ports:
            - containerPort: 8000

