apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-api
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp-api
  template:
    metadata:
      labels:
        app: myapp-api
    spec:
      containers:
        - name: myapp-api
          image: irwan34/api-service@sha256:d693ebfeaa23b761a17a0a7f4749b2f83e6ca44472c228840f2f77f0dfbd3199
          ports:
            - containerPort: 8000

